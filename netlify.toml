# ─────────────────────────────────────────────────
# Netlify Configuration for Portfolio Site
# ─────────────────────────────────────────────────

[build]
  command   = "pnpm build"
  publish   = ".next"

# ─────────────────────────────────────────────────
# Secrets Scanning
# ─────────────────────────────────────────────────
# Netlify scans the repo for env var VALUES appearing in source code.
# The keys below are NOT real secrets — they are common config values
# like "3000", "production", or a public contact email that naturally
# appear in Dockerfiles, config files, and UI code.

[build.environment]
  SECRETS_SCAN_OMIT_KEYS = "APP_PORT,NODE_ENV,CONTACT_EMAIL,SMTP_HOST,SMTP_PORT,SMTP_USER"
  SECRETS_SCAN_OMIT_PATHS = ".env.example,Dockerfile,Dockerfile.dev,docker-compose.dev.yml,docker-compose.prod.yml,pnpm-lock.yaml,README.md,.gitignore"

# ─────────────────────────────────────────────────
# Caching headers for static assets
# ─────────────────────────────────────────────────

# Next.js static files (hashed assets like JS, CSS, Media)
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Portfolio Images (Public directory - non-hashed but stable)
[[headers]]
  for = "/imgPortofolio/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Placeholder Images
[[headers]]
  for = "/placeholders/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Documents/PDFs
[[headers]]
  for = "/docs/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Common static asset extensions (Global)
[[headers]]
  for = "/*.{png,jpg,jpeg,gif,webp,svg,ico,woff2,woff,ttf,otf}"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Next.js optimized images (if using next/image with Netlify loader)
[[headers]]
  for = "/_next/image*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
