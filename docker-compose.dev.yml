services:
  redis:
    image: redis:alpine
    container_name: redis-dev
    ports:
      - "6379:6379"
    restart: unless-stopped

  portfolio-dev:
    container_name: portfolio-dev
    build:
      context: .
      dockerfile: Dockerfile.dev
    env_file:
      - .env.dev
    ports:
      - "${APP_PORT:-3000}:3000"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - redis
    restart: unless-stopped
